<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <title>Admin - Novo Produto</title>
</head>
<body>
  <h1>Cadastrar Produto</h1>

  <form id="form">
    <label>Nome</label><br />
    <input name="name" required /><br /><br />

    <label>Categoria</label> <br />
    <select name="category" required>
      <optgroup label="Projetos Digitais">
        <option value="natal">Natal</option>
        <option value="pascoa">Páscoa</option>
        <option value="boneca">Boneca</option>
      </optgroup>
      <optgroup label="Outros">
        <option value="kits">Kits</option>
        <option value="diversos">Diversos</option>
        <option value="geral">Geral</option>
      </optgroup>
    </select> <br /><br />

    <label>Descrição</label><br />
    <textarea name="description"></textarea><br /><br />

    <label>Preço (ex: 49,90)</label><br />
    <input name="price" required /><br /><br />

    <label>Moeda</label><br />
    <select name="currency">
      <option value="brl">BRL</option>
      <option value="rub">RUB (futuro)</option>
    </select><br /><br />

    <label>Imagens (múltiplas)</label><br />
    <input type="file" name="images" accept="image/*" multiple required /><br /><br />

    <label>PDF</label><br />
    <input type="file" name="file" accept="application/pdf" required /><br /><br />

    <button type="submit">Cadastrar</button>
  </form>

  <pre id="out"></pre>

  <script>
    const form = document.getElementById("form");
    const out = document.getElementById("out");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const fd = new FormData(form);

      const res = await fetch("/api/admin/products", { method: "POST", body: fd });
      const data = await res.json().catch(() => ({}));

      out.textContent = JSON.stringify({ status: res.status, data }, null, 2);
    });
  </script>
</body>
</html>
