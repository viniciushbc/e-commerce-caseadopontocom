<!doctype html>
<html lang="pt-br" data-theme="caseado">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho — Caseado.com</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body class="bg-base-100">
  <div id="header-root"></div>

  <main class="min-h-[70vh]">
    <div class="max-w-3xl mx-auto px-4 py-12">

      <h1 class="text-3xl font-heading text-base-content mb-8 flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>
        Meu Carrinho
      </h1>

      <!-- Itens do carrinho (preenchido pelo JS) -->
      <div id="cart"></div>

      <!-- Resumo / Total -->
      <div id="cart-summary" style="display:none" class="card bg-base-200 border border-base-300 mt-6">
        <div class="card-body gap-4">
          <div class="flex justify-between items-center">
            <span class="font-bold text-lg text-base-content">Total</span>
            <span class="text-2xl font-extrabold text-primary" id="total">R$ 0,00</span>
          </div>
          <button class="btn btn-primary w-full rounded-full text-base font-bold shadow-md shadow-primary/30" id="checkout">
            Finalizar Compra
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </button>
          <button class="btn btn-ghost btn-sm w-full rounded-full text-base-content/50" id="clear-cart">
            Limpar carrinho
          </button>
        </div>
      </div>

    </div>
  </main>

  <div id="footer-root"></div>

  <script type="module" src="/src/pages/cart/cartPage.js"></script>
</body>
</html>
