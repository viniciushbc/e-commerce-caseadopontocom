<!doctype html>
<html lang="pt-br" data-theme="caseado">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categoria — Caseado.com</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="header-root"></div>

  <main>
    <!-- Banner preenchido pelo JS -->
    <div id="cat-banner"></div>

    <!-- Grid de produtos -->
    <section class="py-10 products-section relative" aria-label="Produtos da categoria">
      <div class="max-w-6xl mx-auto px-4 pb-8">
        <div id="status" class="flex flex-col items-center gap-3 py-20 text-base-content/50">
          <span class="loading loading-spinner loading-lg text-primary"></span>
          <p>Carregando produtos...</p>
        </div>
        <div id="grid" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5"></div>
      </div>

      <!-- Decoração inferior -->
      <div class="flex justify-center mt-4 opacity-20" aria-hidden="true">
        <img src="/images/details/linha_coracao.png" alt=""
             class="w-32 h-auto object-contain" />
      </div>
    </section>
  </main>

  <div id="footer-root"></div>

  <script type="module" src="/src/pages/category/categoryPage.js"></script>
</body>
</html>
