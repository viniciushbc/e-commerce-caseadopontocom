<!doctype html>
<html lang="pt-br" data-theme="caseado">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caseado.com — Artesanato de Bonecas</title>
  <meta name="description" content="Projetos digitais, kits e muito mais para criar peças únicas de artesanato de bonecas." />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>

  <div id="header-root"></div>

  <!-- Etiqueta de navegação: header → categorias -->
  <div class="cat-nav-bridge" aria-hidden="true">
    <div class="cat-nav-bridge-line"></div>
    <div class="cat-nav-bridge-tag">
      <img data-botao-icon src="/images/icons/botao_06.png" alt=""
           class="w-4 h-4 object-contain opacity-55 flex-shrink-0" />
      <span>Navegue por Categoria</span>
      <img data-botao-icon src="/images/icons/botao_06.png" alt=""
           class="w-4 h-4 object-contain opacity-55 flex-shrink-0" />
    </div>
    <div class="cat-nav-bridge-line"></div>
  </div>

  <main>

    <!-- ====== FAIXA DE CATEGORIAS (compacta) ====== -->
    <section class="py-5 cat-rose-section" aria-label="Categorias">
      <div class="max-w-5xl mx-auto px-4">
        <div class="flex flex-wrap gap-3 justify-center">

          <a href="/category.html?cat=natal" class="cat-card">
            <img data-botao-icon src="/images/icons/botao_01.png" alt="Natal"
                 class="w-10 h-10 object-contain transition-transform duration-200" />
            <span class="font-bold text-xs text-base-content/70 transition-colors">Natal</span>
          </a>

          <a href="/category.html?cat=pascoa" class="cat-card">
            <img data-botao-icon src="/images/icons/botao_02.png" alt="Páscoa"
                 class="w-10 h-10 object-contain transition-transform duration-200" />
            <span class="font-bold text-xs text-base-content/70 transition-colors">Páscoa</span>
          </a>

          <a href="/category.html?cat=boneca" class="cat-card">
            <img data-botao-icon src="/images/icons/botao_03.png" alt="Boneca"
                 class="w-10 h-10 object-contain transition-transform duration-200" />
            <span class="font-bold text-xs text-base-content/70 transition-colors">Boneca</span>
          </a>

          <a href="/category.html?cat=kits" class="cat-card">
            <img data-botao-icon src="/images/icons/botao_04.png" alt="Kits"
                 class="w-10 h-10 object-contain transition-transform duration-200" />
            <span class="font-bold text-xs text-base-content/70 transition-colors">Kits</span>
          </a>

          <a href="/category.html?cat=diversos" class="cat-card">
            <img data-botao-icon src="/images/icons/botao_05.png" alt="Diversos"
                 class="w-10 h-10 object-contain transition-transform duration-200" />
            <span class="font-bold text-xs text-base-content/70 transition-colors">Diversos</span>
          </a>

        </div>
      </div>
    </section>

    <!-- ====== SHOWCASE DE MARCA ====== -->
    <section class="hero-brand-stage py-14 px-4 relative overflow-hidden">

      <!-- Decoração de canto: imagem artesanal desbotada -->
      <img data-bigger-detail="corner" src="/images/bigger_details/coracao_agulha_trim.png"
           alt="" aria-hidden="true"
           class="pointer-events-none select-none absolute bottom-4 right-6 h-32 w-auto object-contain opacity-10 rotate-12 hidden lg:block" />

      <div class="max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-center gap-8 sm:gap-14 relative z-10">

        <!-- Logo grande, lateralizada -->
        <img src="/images/logo.png"
             onerror="this.style.display='none'"
             alt="Caseado.com"
             class="h-48 sm:h-56 lg:h-72 w-auto object-contain drop-shadow-2xl flex-shrink-0" />

        <!-- Nome do site ao lado -->
        <div class="flex flex-col items-center sm:items-start text-center sm:text-left">
          <h1 class="font-heading font-bold text-6xl sm:text-7xl lg:text-8xl text-primary leading-none tracking-tight">
            Caseado.com
          </h1>
          <div class="h-0.5 w-16 bg-secondary/30 mt-4 mb-5 hidden sm:block"></div>
          <p class="font-bold text-xl sm:text-2xl text-secondary" style="font-family:'Amatic SC',cursive; letter-spacing:0.08em;">
            Artesanato de Bonecas
          </p>
        </div>

      </div>

      <!-- Divisor escalonado → fundo de produtos -->
      <div class="absolute bottom-0 left-0 right-0 pointer-events-none" aria-hidden="true">
        <svg viewBox="0 0 1440 56" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"
             class="w-full block" style="height:56px; display:block;">
          <path d="M0,56 L0,34 C80,34 80,0 160,0 C240,0 240,34 320,34 C400,34 400,0 480,0 C560,0 560,34 640,34 C720,34 720,0 800,0 C880,0 880,34 960,34 C1040,34 1040,0 1120,0 C1200,0 1200,34 1280,34 C1360,34 1360,0 1440,0 L1440,56 Z"
                fill="#DDF4F6"/>
        </svg>
      </div>
    </section>

    <!-- ====== PRODUTOS ====== -->
    <section id="produtos" class="py-12 relative products-section" aria-label="Nossos produtos">

      <!-- Detalhes decorativos nas laterais -->
      <img src="/images/details/botoes_turquesa_roxo.png" alt="" aria-hidden="true"
           class="pointer-events-none select-none absolute left-2 top-8 w-16 h-auto object-contain opacity-25 -rotate-12 hidden lg:block" />
      <img src="/images/details/botoes_amarelo_verde.png" alt="" aria-hidden="true"
           class="pointer-events-none select-none absolute right-2 top-8 w-16 h-auto object-contain opacity-25 rotate-12 hidden lg:block" />

      <!-- Detalhes decorativos inferiores -->
      <img src="/images/details/botoes_turquesa_roxo.png" alt="" aria-hidden="true"
           class="pointer-events-none select-none absolute left-4 bottom-20 w-12 h-auto object-contain opacity-15 rotate-6 hidden lg:block" />
      <img src="/images/details/botoes_amarelo_verde.png" alt="" aria-hidden="true"
           class="pointer-events-none select-none absolute right-4 bottom-20 w-12 h-auto object-contain opacity-15 -rotate-6 hidden lg:block" />

      <!-- Cabeçalho da seção -->
      <div class="text-center mb-8 px-4">
        <h2 class="text-3xl font-heading text-base-content mb-2">Nossos Produtos</h2>
        <div class="flex items-center justify-center gap-3">
          <div class="h-px w-12 bg-secondary/40"></div>
          <img data-botao-icon src="/images/icons/botao_06.png" alt="" aria-hidden="true"
               class="w-6 h-6 object-contain opacity-60" />
          <div class="h-px w-12 bg-secondary/40"></div>
        </div>
      </div>

      <div class="max-w-6xl mx-auto px-4 pb-8">
        <div id="status" class="flex flex-col items-center gap-3 py-20 text-base-content/50">
          <span class="loading loading-spinner loading-lg text-primary"></span>
          <p>Carregando produtos...</p>
        </div>
        <div id="grid" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5"></div>
      </div>

      <!-- Decoração inferior: linha_coracao -->
      <div class="flex justify-center mt-4 opacity-25" aria-hidden="true">
        <img src="/images/details/linha_coracao.png" alt=""
             class="w-36 h-auto object-contain" />
      </div>
    </section>

  </main>

  <div id="footer-root"></div>

  <script type="module" src="/src/pages/products/productsPage.js"></script>
  <script type="module">
    import { getCategoryIcon, getBiggerDetail, getButtonIcon, BUTTON_ICONS } from "/src/utils/categories.js";
    document.querySelectorAll("[data-cat-icon]").forEach(img => {
      img.src = getCategoryIcon(img.dataset.catIcon);
    });
    const botaoImgs = Array.from(document.querySelectorAll("[data-botao-icon]"));
    const shuffled  = [...BUTTON_ICONS].sort(() => Math.random() - 0.5);
    botaoImgs.forEach((img, i) => { img.src = shuffled[i % shuffled.length]; });
    let lastBigger = null;
    document.querySelectorAll("[data-bigger-detail]").forEach(img => {
      const picked = getBiggerDetail(lastBigger);
      lastBigger = picked;
      img.src = picked;
    });
  </script>
</body>
</html>
